##############################################################
# AnalyticsForge — Render Blueprint
# Backend:  Docker Web Service  (python:3.12-slim, no build issues)
# Frontend: Static Site         (free CDN, never spins down)
##############################################################

databases:
  - name: analyticsforge-db
    databaseName: analyticsforge
    user: analyticsforge
    plan: free

services:
  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: analyticsforge-redis
    plan: free
    ipAllowList: []

  # ── FastAPI Backend (Docker) ───────────────────────────────────────────────────
  - type: web
    name: analyticsforge-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: analyticsforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: analyticsforge-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://analyticsforge-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── React Frontend (Static Site — free, CDN, no spin-down) ────────────────────
  - type: web
    name: analyticsforge-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: analyticsforge-backend
          type: web
          property: host
